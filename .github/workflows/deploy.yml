name: Deploy to Google Apps Script

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Create deploy credentials
        env:
          CLASP_CREDENTIALS_BASE64: ${{ secrets.CLASP_CREDENTIALS_JSON_BASE64 }}
        run: |
          echo "$CLASP_CREDENTIALS_BASE64" | base64 --decode > ~/.clasprc.json

          if [ ! -s ~/.clasprc.json ]; then
            echo "Error: ~/.clasprc.json is empty or not created"
            exit 1
          fi

          cat ~/.clasprc.json | jq . > /dev/null
          if [ $? -ne 0 ]; then
            echo "Error: ~/.clasprc.json is not a valid JSON"
            exit 1
          fi

      - name: Create clasp project config
        env:
          GAS_PROJECT_BASE64: ${{ secrets.GAS_PROJECT_JSON_BASE64 }}
        run: |
          echo "$GAS_PROJECT_BASE64" | base64 --decode > .clasp.json

          if [ ! -s .clasp.json ]; then
            echo "Error: .clasp.json is empty or not created"
            exit 1
          fi

          cat .clasp.json | jq . > /dev/null
          if [ $? -ne 0 ]; then
            echo "Error: .clasp.json is not a valid JSON"
            exit 1
          fi

      - name: Deploy to GAS
        env:
          GAS_WEBAPP_DEPLOYMENT_ID: ${{ secrets.GAS_WEBAPP_DEPLOYMENT_ID }}
        run: |
          if [ -z "$GAS_WEBAPP_DEPLOYMENT_ID" ]; then
            echo "Error: GAS_WEBAPP_DEPLOYMENT_ID secret is not set"
            exit 1
          fi

          clasp push --force

          VERSION_OUTPUT="$(clasp version "auto deploy ${GITHUB_SHA}")"
          echo "$VERSION_OUTPUT"

          VERSION_NUMBER="$(echo "$VERSION_OUTPUT" | sed -nE 's/.*version[[:space:]]+([0-9]+).*/\1/p' | tail -n 1)"
          if [ -z "$VERSION_NUMBER" ]; then
            echo "Error: failed to parse Apps Script version number"
            exit 1
          fi

          clasp deploy \
            --deploymentId "$GAS_WEBAPP_DEPLOYMENT_ID" \
            --versionNumber "$VERSION_NUMBER" \
            --description "auto deploy ${GITHUB_SHA}"
